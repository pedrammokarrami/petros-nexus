<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
  <defs>
    <radialGradient id="clubFog" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0520"/>
      <stop offset="50%" stop-color="#0f0315"/>
      <stop offset="100%" stop-color="#050108"/>
    </radialGradient>
    <radialGradient id="strobeCenter" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="60%" stop-color="rgba(200,100,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1920" fill="#050108"/>
  <rect width="1080" height="1920" fill="url(#clubFog)"/>
  <rect width="1080" height="1920" fill="url(#strobeCenter)"/>
  <!-- DJ booth silhouette -->
  <rect x="340" y="600" width="400" height="100" rx="10" fill="#0a0a12" stroke="rgba(100,50,150,0.2)" stroke-width="1"/>
  <!-- DJ decks -->
  <rect x="370" y="560" width="150" height="50" rx="5" fill="#0d0d18"/>
  <rect x="560" y="560" width="150" height="50" rx="5" fill="#0d0d18"/>
  <!-- Mixer -->
  <rect x="460" y="580" width="160" height="30" rx="3" fill="#0f0f1a"/>
  <!-- Laser beams from top -->
  <line x1="200" y1="0" x2="540" y2="600" stroke="rgba(0,255,200,0.08)" stroke-width="2"/>
  <line x1="880" y1="0" x2="540" y2="600" stroke="rgba(255,0,200,0.08)" stroke-width="2"/>
  <line x1="400" y1="0" x2="540" y2="700" stroke="rgba(200,100,255,0.06)" stroke-width="1.5"/>
  <line x1="680" y1="0" x2="540" y2="700" stroke="rgba(100,200,255,0.06)" stroke-width="1.5"/>
  <!-- Dance floor crowd silhouettes -->
  <rect x="200" y="800" width="680" height="3" fill="rgba(100,50,150,0.1)"/>
  <circle cx="300" cy="880" r="20" fill="rgba(255,255,255,0.02)"/>
  <circle cx="400" cy="900" r="22" fill="rgba(255,255,255,0.02)"/>
  <circle cx="500" cy="870" r="20" fill="rgba(255,255,255,0.025)"/>
  <circle cx="600" cy="895" r="22" fill="rgba(255,255,255,0.02)"/>
  <circle cx="700" cy="875" r="20" fill="rgba(255,255,255,0.02)"/>
  <circle cx="800" cy="890" r="21" fill="rgba(255,255,255,0.015)"/>
  <!-- More crowd -->
  <circle cx="350" cy="950" r="20" fill="rgba(255,255,255,0.015)"/>
  <circle cx="450" cy="970" r="21" fill="rgba(255,255,255,0.02)"/>
  <circle cx="550" cy="940" r="20" fill="rgba(255,255,255,0.015)"/>
  <circle cx="650" cy="960" r="22" fill="rgba(255,255,255,0.02)"/>
  <circle cx="750" cy="945" r="20" fill="rgba(255,255,255,0.015)"/>
  <!-- Light beams radiating -->
  <line x1="540" y1="200" x2="100" y2="800" stroke="rgba(100,200,255,0.03)" stroke-width="3"/>
  <line x1="540" y1="200" x2="980" y2="800" stroke="rgba(255,100,200,0.03)" stroke-width="3"/>
  <line x1="540" y1="200" x2="200" y2="700" stroke="rgba(200,255,100,0.02)" stroke-width="2"/>
  <line x1="540" y1="200" x2="880" y2="700" stroke="rgba(255,200,100,0.02)" stroke-width="2"/>
</svg>
