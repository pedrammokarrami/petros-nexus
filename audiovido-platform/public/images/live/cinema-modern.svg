<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
  <defs>
    <radialGradient id="spotlight" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="60%" stop-color="#0a0a15"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <linearGradient id="screenGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(100,180,255,0.15)"/>
      <stop offset="50%" stop-color="rgba(100,180,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(100,180,255,0.12)"/>
    </linearGradient>
    <linearGradient id="curtain" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="15%" stop-color="#2d0f0f"/>
      <stop offset="30%" stop-color="#1a0808"/>
      <stop offset="50%" stop-color="#2d0f0f"/>
      <stop offset="70%" stop-color="#1a0808"/>
      <stop offset="85%" stop-color="#2d0f0f"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f0ff"/>
      <stop offset="50%" stop-color="#c0d0f0"/>
      <stop offset="100%" stop-color="#d0d8f0"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#spotlight)"/>
  <!-- Theater walls -->
  <rect x="0" y="0" width="1080" height="1920" fill="url(#curtain)" opacity="0.3"/>
  <!-- Screen frame -->
  <rect x="140" y="280" width="800" height="500" rx="8" fill="#111" stroke="#333" stroke-width="4"/>
  <!-- Screen surface -->
  <rect x="150" y="290" width="780" height="480" rx="4" fill="url(#screen)" opacity="0.9"/>
  <rect x="150" y="290" width="780" height="480" rx="4" fill="url(#screenGlow)"/>
  <!-- Ambient light on floor -->
  <ellipse cx="540" cy="800" rx="400" ry="60" fill="rgba(100,180,255,0.06)"/>
  <!-- Row of seats hint -->
  <rect x="200" y="880" width="680" height="3" rx="1.5" fill="rgba(255,255,255,0.08)"/>
  <rect x="220" y="930" width="640" height="3" rx="1.5" fill="rgba(255,255,255,0.06)"/>
  <rect x="240" y="980" width="600" height="3" rx="1.5" fill="rgba(255,255,255,0.05)"/>
  <rect x="260" y="1030" width="560" height="3" rx="1.5" fill="rgba(255,255,255,0.04)"/>
  <!-- Subtle side wall sconces -->
  <circle cx="80" cy="300" r="6" fill="rgba(255,200,100,0.3)"/>
  <circle cx="1000" cy="300" r="6" fill="rgba(255,200,100,0.3)"/>
  <circle cx="80" cy="450" r="6" fill="rgba(255,200,100,0.2)"/>
  <circle cx="1000" cy="450" r="6" fill="rgba(255,200,100,0.2)"/>
</svg>
