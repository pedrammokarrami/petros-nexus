<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
  <defs>
    <radialGradient id="barLight" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#2a1a0e"/>
      <stop offset="60%" stop-color="#1a1008"/>
      <stop offset="100%" stop-color="#0a0604"/>
    </radialGradient>
    <linearGradient id="barTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2010"/>
      <stop offset="100%" stop-color="#1a0e06"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#barLight)"/>
  <!-- Bar counter -->
  <rect x="0" y="700" width="1080" height="40" fill="url(#barTop)"/>
  <rect x="0" y="740" width="1080" height="200" fill="#1a0e06"/>
  <rect x="0" y="700" width="1080" height="3" fill="rgba(200,150,80,0.3)"/>
  <!-- Bar top reflection -->
  <rect x="0" y="700" width="1080" height="40" fill="rgba(200,150,80,0.05)"/>
  <!-- Shelves with bottles -->
  <rect x="50" y="400" width="980" height="3" fill="rgba(200,150,80,0.15)"/>
  <rect x="50" y="520" width="980" height="3" fill="rgba(200,150,80,0.12)"/>
  <!-- Bottles silhouette -->
  <rect x="100" y="420" width="20" height="80" rx="3" fill="rgba(200,150,80,0.15)"/>
  <rect x="140" y="435" width="15" height="65" rx="3" fill="rgba(200,200,100,0.12)"/>
  <rect x="180" y="410" width="22" height="90" rx="4" fill="rgba(200,100,100,0.12)"/>
  <rect x="850" y="425" width="18" height="75" rx="3" fill="rgba(100,200,150,0.12)"/>
  <rect x="890" y="415" width="20" height="85" rx="3" fill="rgba(200,150,100,0.15)"/>
  <rect x="930" y="430" width="16" height="70" rx="3" fill="rgba(200,200,100,0.1)"/>
  <!-- Row 2 bottles -->
  <rect x="100" y="540" width="20" height="80" rx="3" fill="rgba(200,150,80,0.1)"/>
  <rect x="150" y="550" width="15" height="70" rx="3" fill="rgba(100,200,150,0.08)"/>
  <rect x="850" y="545" width="18" height="75" rx="3" fill="rgba(200,150,100,0.1)"/>
  <!-- Ambient warm glow -->
  <ellipse cx="540" cy="400" rx="300" ry="200" fill="rgba(200,150,80,0.03)"/>
  <!-- Bar stools -->
  <rect x="200" y="950" width="20" height="60" rx="5" fill="rgba(50,30,20,0.5)"/>
  <rect x="195" y="940" width="30" height="15" rx="5" fill="rgba(60,40,30,0.5)"/>
  <rect x="500" y="950" width="20" height="60" rx="5" fill="rgba(50,30,20,0.5)"/>
  <rect x="495" y="940" width="30" height="15" rx="5" fill="rgba(60,40,30,0.5)"/>
  <rect x="800" y="950" width="20" height="60" rx="5" fill="rgba(50,30,20,0.5)"/>
  <rect x="795" y="940" width="30" height="15" rx="5" fill="rgba(60,40,30,0.5)"/>
  <!-- Wall sconces -->
  <circle cx="60" cy="300" r="8" fill="rgba(200,150,80,0.2)"/>
  <circle cx="60" cy="300" r="4" fill="rgba(255,200,100,0.3)"/>
  <circle cx="1020" cy="300" r="8" fill="rgba(200,150,80,0.2)"/>
  <circle cx="1020" cy="300" r="4" fill="rgba(255,200,100,0.3)"/>
  <circle cx="60" cy="550" r="8" fill="rgba(200,150,80,0.15)"/>
  <circle cx="1020" cy="550" r="8" fill="rgba(200,150,80,0.15)"/>
</svg>
