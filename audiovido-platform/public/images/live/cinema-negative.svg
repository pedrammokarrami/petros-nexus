<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="grained"/>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a10"/>
      <stop offset="70%" stop-color="#0f0f08"/>
      <stop offset="100%" stop-color="#050502"/>
    </radialGradient>
    <linearGradient id="filmScratch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="30%" stop-color="rgba(255,255,255,0.04)"/>
      <stop offset="31%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="60%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="61%" stop-color="rgba(255,255,255,0.03)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1920" fill="#0d0d05"/>
  <!-- Grain overlay -->
  <rect width="1080" height="1920" fill="url(#vignette)"/>
  <rect width="1080" height="1920" fill="url(#filmScratch)" opacity="0.5"/>
  <!-- Screen frame - old cinema -->
  <rect x="120" y="240" width="840" height="540" rx="2" fill="#1a1008" stroke="#3a2a18" stroke-width="6"/>
  <rect x="130" y="250" width="820" height="520" rx="1" fill="#c8b890" opacity="0.35"/>
  <!-- Film reel circles -->
  <circle cx="540" cy="820" r="40" fill="none" stroke="rgba(200,180,120,0.1)" stroke-width="2"/>
  <circle cx="540" cy="820" r="30" fill="none" stroke="rgba(200,180,120,0.08)" stroke-width="1"/>
  <circle cx="540" cy="820" r="20" fill="none" stroke="rgba(200,180,120,0.05)" stroke-width="1"/>
  <!-- Old projector beam -->
  <polygon points="540,240 300,500 780,500" fill="rgba(180,160,100,0.03)"/>
  <!-- Floor -->
  <rect x="0" y="850" width="1080" height="1070" fill="rgba(10,8,4,0.5)"/>
  <!-- Cigarette smoke wisps (static decorative) -->
  <path d="M300 900 Q320 880 310 860 Q300 840 320 820" fill="none" stroke="rgba(180,170,150,0.04)" stroke-width="8" stroke-linecap="round"/>
  <path d="M700 920 Q710 900 690 870 Q680 850 700 830" fill="none" stroke="rgba(180,170,150,0.03)" stroke-width="6" stroke-linecap="round"/>
</svg>
