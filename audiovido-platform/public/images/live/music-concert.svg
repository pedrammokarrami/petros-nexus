<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920">
  <defs>
    <radialGradient id="stageLight" cx="50%" cy="25%" r="60%">
      <stop offset="0%" stop-color="#1a1030"/>
      <stop offset="50%" stop-color="#0e0818"/>
      <stop offset="100%" stop-color="#050308"/>
    </radialGradient>
    <linearGradient id="projector" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,220,150,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,220,150,0)"/>
    </linearGradient>
    <linearGradient id="projector2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(150,200,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(150,200,255,0)"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#stageLight)"/>
  <!-- Stage platform -->
  <rect x="100" y="600" width="880" height="40" rx="4" fill="#0a0612"/>
  <rect x="100" y="640" width="880" height="200" fill="#06040a"/>
  <!-- Performers silhouettes -->
  <rect x="440" y="470" width="200" height="130" rx="10" fill="#0a0612" opacity="0.6"/>
  <circle cx="540" cy="450" r="30" fill="#0a0612" opacity="0.6"/>
  <!-- Guitar -->
  <rect x="600" y="490" width="30" height="80" rx="3" fill="#0a0612" opacity="0.4"/>
  <!-- Mic stand -->
  <line x1="500" y1="500" x2="500" y2="580" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
  <circle cx="500" cy="500" r="5" fill="rgba(255,255,255,0.06)"/>
  <!-- Projector beams from top -->
  <polygon points="200,0 250,0 540,600 540,600" fill="url(#projector)" opacity="0.8"/>
  <polygon points="540,0 540,0 200,600 100,600" fill="url(#projector2)" opacity="0.6"/>
  <polygon points="880,0 830,0 540,600 540,600" fill="url(#projector)" opacity="0.7"/>
  <polygon points="540,0 540,0 880,600 980,600" fill="url(#projector2)" opacity="0.5"/>
  <polygon points="350,0 400,0 540,500 500,500" fill="rgba(200,150,255,0.04)"/>
  <polygon points="680,0 730,0 540,500 580,500" fill="rgba(150,200,255,0.04)"/>
  <!-- Stage lights truss -->
  <rect x="0" y="0" width="1080" height="8" fill="#0a0612"/>
  <rect x="180" y="8" width="4" height="40" fill="#0a0612"/>
  <rect x="540" y="8" width="4" height="40" fill="#0a0612"/>
  <rect x="896" y="8" width="4" height="40" fill="#0a0612"/>
  <!-- Light fixtures -->
  <rect x="160" y="40" width="40" height="15" rx="3" fill="#1a1220"/>
  <rect x="520" y="40" width="40" height="15" rx="3" fill="#1a1220"/>
  <rect x="880" y="40" width="40" height="15" rx="3" fill="#1a1220"/>
  <!-- Audience -->
  <circle cx="200" cy="780" r="15" fill="rgba(255,255,255,0.015)"/>
  <circle cx="300" cy="800" r="16" fill="rgba(255,255,255,0.015)"/>
  <circle cx="400" cy="770" r="15" fill="rgba(255,255,255,0.02)"/>
  <circle cx="500" cy="790" r="16" fill="rgba(255,255,255,0.015)"/>
  <circle cx="600" cy="775" r="15" fill="rgba(255,255,255,0.02)"/>
  <circle cx="700" cy="795" r="16" fill="rgba(255,255,255,0.015)"/>
  <circle cx="800" cy="780" r="15" fill="rgba(255,255,255,0.015)"/>
  <circle cx="900" cy="800" r="16" fill="rgba(255,255,255,0.01)"/>
  <!-- More audience -->
  <circle cx="250" cy="860" r="15" fill="rgba(255,255,255,0.01)"/>
  <circle cx="350" cy="880" r="16" fill="rgba(255,255,255,0.015)"/>
  <circle cx="450" cy="850" r="15" fill="rgba(255,255,255,0.01)"/>
  <circle cx="550" cy="870" r="16" fill="rgba(255,255,255,0.015)"/>
  <circle cx="650" cy="855" r="15" fill="rgba(255,255,255,0.01)"/>
  <circle cx="750" cy="875" r="16" fill="rgba(255,255,255,0.015)"/>
  <circle cx="850" cy="860" r="15" fill="rgba(255,255,255,0.01)"/>
</svg>
