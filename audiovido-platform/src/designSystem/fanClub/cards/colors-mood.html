<!-- @dsCard group="Colors" viewport="700x200" name="Mood spectrum" subtitle="The room shifts temperature with the conversation." -->
<!doctype html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); padding: 24px; font-family: var(--font-mono); color: var(--text-dim); }
  .strip { height: 80px; border-radius: 16px;
           background: linear-gradient(90deg, #3a86ff 0%, #8338ec 25%, #b5179e 50%, #f72585 75%, #ff8500 100%);
           box-shadow: 0 0 60px rgba(131, 56, 236, 0.3), 0 0 120px rgba(247, 37, 133, 0.2); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 16px; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .col .dot { width: 14px; height: 14px; border-radius: 50%; }
  .col .name { color: var(--text-hi); font-weight: 700; font-size: 11px; }
  .col .hex { color: var(--text-muted); font-size: 9px; }
</style>
</head>
<body>
  <div class="strip"></div>
  <div class="row">
    <div class="col"><div class="dot" style="background:#3a86ff;box-shadow:0 0 16px #3a86ff"></div><div class="name">Chill</div><div class="hex">#3a86ff</div></div>
    <div class="col"><div class="dot" style="background:#8338ec;box-shadow:0 0 16px #8338ec"></div><div class="name">Mellow</div><div class="hex">#8338ec</div></div>
    <div class="col"><div class="dot" style="background:#b5179e;box-shadow:0 0 16px #b5179e"></div><div class="name">Engaged</div><div class="hex">#b5179e</div></div>
    <div class="col"><div class="dot" style="background:#f72585;box-shadow:0 0 16px #f72585"></div><div class="name">Hype</div><div class="hex">#f72585</div></div>
    <div class="col"><div class="dot" style="background:#ff8500;box-shadow:0 0 16px #ff8500"></div><div class="name">Euphoric</div><div class="hex">#ff8500</div></div>
  </div>
</body>
</html>
