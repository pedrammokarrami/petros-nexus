<!-- @dsCard group="Type" viewport="700x220" name="Body · Space Grotesk" subtitle="Messages run slightly oversize at 18px." -->
<!doctype html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); padding: 28px; color: var(--text-body); }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
  .msg { font-family: var(--font-body); font-size: 18px; line-height: 1.55; color: var(--text-hi); margin-bottom: 18px; }
  .body { font-family: var(--font-body); font-size: 16px; line-height: 1.6; color: var(--text-body); margin-bottom: 18px; max-width: 580px; }
  .dim { font-family: var(--font-body); font-size: 14px; color: var(--text-dim); }
</style>
</head>
<body>
  <div class="lbl">Message · 18/400</div>
  <div class="msg">that drum break? unreal. who's the producer</div>
  <div class="lbl">Body · 16/400</div>
  <div class="body">Friday night the bar opens at 9. Members get first dibs on the new pressing — limited to 200.</div>
  <div class="lbl">Dim · 14/400</div>
  <div class="dim">47 vibing right now · last message 2s ago</div>
</body>
</html>
