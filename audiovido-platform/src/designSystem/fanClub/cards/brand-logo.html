<!-- @dsCard group="Brand" viewport="700x220" name="The CRT mark" subtitle="Vintage tube on a void backdrop. Our north star." -->
<!doctype html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); padding: 24px; display: flex; align-items: center; justify-content: center; gap: 32px; }
  .tv {
    width: 240px; aspect-ratio: 4 / 3; position: relative;
    border-radius: 28px;
    background: linear-gradient(180deg, #2a2538 0%, #11101a 100%);
    box-shadow: 0 18px 48px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
    padding: 16px;
  }
  .glass {
    position: absolute; inset: 16px; border-radius: 22px;
    background: radial-gradient(120% 80% at 50% 30%, #2a3a55 0%, #08080f 70%);
    box-shadow: inset 0 0 80px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.08);
    overflow: hidden;
  }
  .glass::before {
    content: ""; position: absolute; inset: 0;
    background: repeating-linear-gradient(to bottom, rgba(255,255,255,0.04) 0 1px, transparent 1px 3px);
    pointer-events: none;
  }
  .glass::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(60% 40% at 50% 30%, rgba(0,245,212,0.4), transparent 70%);
  }
  .logo {
    font-family: var(--font-display); font-weight: 800; font-size: 56px; line-height: 1; letter-spacing: -0.02em;
    color: var(--smoke-100);
    text-shadow: 0 0 24px rgba(247, 37, 133, 0.6), 0 0 56px rgba(0, 245, 212, 0.4);
  }
  .tagline { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-top: 14px; }
</style>
</head>
<body>
  <div class="tv">
    <div class="glass"></div>
  </div>
  <div>
    <div class="logo">audiovido</div>
    <div class="tagline">Step into the club</div>
  </div>
</body>
</html>
