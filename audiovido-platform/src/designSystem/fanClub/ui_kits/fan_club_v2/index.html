<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Fan Club v2 · Audiovido</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body, #root { height: 100%; }
  body { margin: 0; background: #050509; color: var(--text-body); overflow-x: hidden; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="../../assets/image-slot.js"></script>
<script src="../../_ds_bundle.js"></script>

<script type="text/babel" src="./data.js"></script>
<script type="text/babel" src="./SmokeField.jsx"></script>
<script type="text/babel" src="./EmojiBurst.jsx"></script>
<script type="text/babel" src="./DrinkMenu.jsx"></script>
<script type="text/babel" src="./RoomProps.jsx"></script>
<script type="text/babel" src="./FanClubRoom.jsx"></script>

<script type="text/babel">
  function App() {
    const CLUBS = window.__CLUBS_V2 || {};
    const [slug, setSlug] = React.useState("rock");
    const club = CLUBS[slug];
    const other = CLUBS[slug === "rock" ? "cinema" : "rock"];
    const Room = window.__FanClubRoom;
    if (!Room || !club) {
      return <div style={{ padding: 40, fontFamily: "var(--font-mono)", color: "var(--text-dim)" }}>Loading the venue…</div>;
    }
    return (
      <Room
        club={club}
        otherRoomName={other?.name || "—"}
        onSwitchRoom={() => setSlug(slug === "rock" ? "cinema" : "rock")}
      />
    );
  }
  setTimeout(() => {
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  }, 0);
</script>
</body>
</html>
