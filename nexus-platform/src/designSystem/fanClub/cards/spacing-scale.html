<!-- @dsCard group="Spacing" viewport="700x180" name="4-based scale" subtitle="space-1 (4px) → space-12 (128px)." -->
<!doctype html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); padding: 24px; font-family: var(--font-mono); color: var(--text-dim); }
  .row { display: flex; gap: 8px; align-items: flex-end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: linear-gradient(180deg, var(--cyan-400), var(--coral-400)); border-radius: 3px; width: 24px; }
  .lbl { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
  .val { font-size: 10px; color: var(--text-hi); font-weight: 700; }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="height:4px"></div><div class="lbl">1</div><div class="val">4</div></div>
    <div class="col"><div class="bar" style="height:8px"></div><div class="lbl">2</div><div class="val">8</div></div>
    <div class="col"><div class="bar" style="height:12px"></div><div class="lbl">3</div><div class="val">12</div></div>
    <div class="col"><div class="bar" style="height:16px"></div><div class="lbl">4</div><div class="val">16</div></div>
    <div class="col"><div class="bar" style="height:20px"></div><div class="lbl">5</div><div class="val">20</div></div>
    <div class="col"><div class="bar" style="height:24px"></div><div class="lbl">6</div><div class="val">24</div></div>
    <div class="col"><div class="bar" style="height:32px"></div><div class="lbl">7</div><div class="val">32</div></div>
    <div class="col"><div class="bar" style="height:40px"></div><div class="lbl">8</div><div class="val">40</div></div>
    <div class="col"><div class="bar" style="height:48px"></div><div class="lbl">9</div><div class="val">48</div></div>
    <div class="col"><div class="bar" style="height:64px"></div><div class="lbl">10</div><div class="val">64</div></div>
    <div class="col"><div class="bar" style="height:96px"></div><div class="lbl">11</div><div class="val">96</div></div>
    <div class="col"><div class="bar" style="height:128px"></div><div class="lbl">12</div><div class="val">128</div></div>
  </div>
</body>
</html>
