<!-- @dsCard group="Brand" viewport="700x200" name="Surface treatments" subtitle="Glass, noise, scanlines — the three textures that make the room feel real." -->
<!doctype html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); padding: 24px; font-family: var(--font-mono); color: var(--text-dim); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .tile { aspect-ratio: 1.6/1; border-radius: 14px; padding: 16px; position: relative; overflow: hidden;
          display: flex; flex-direction: column; justify-content: flex-end; gap: 4px; }
  .lbl { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-hi); font-weight: 700; position: relative; z-index:1; }
  .sub { font-size: 10px; color: rgba(255,255,255,0.55); position: relative; z-index:1; }

  .glass {
    background: rgba(18, 18, 31, 0.5);
    backdrop-filter: blur(16px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .glass::before { content: ""; position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(60% 60% at 30% 30%, rgba(0,245,212,0.4), transparent 70%),
      radial-gradient(50% 50% at 80% 80%, rgba(247,37,133,0.4), transparent 70%); }

  .noise { background: #12121f; border: 1px solid var(--border-faint); }
  .noise::before { content: ""; position: absolute; inset: 0; opacity: 0.25;
    background-image: var(--noise); }

  .scan { background: radial-gradient(120% 80% at 50% 30%, #2a3a55 0%, #08080f 80%); }
  .scan::before { content: ""; position: absolute; inset: 0;
    background: repeating-linear-gradient(to bottom, rgba(255,255,255,0.06) 0 1px, transparent 1px 3px); }
  .scan::after { content: ""; position: absolute; inset: 0;
    background: radial-gradient(50% 40% at 50% 30%, rgba(0,245,212,0.35), transparent 70%); }
</style>
</head>
<body>
  <div class="grid">
    <div class="tile glass"><div class="lbl">Glass</div><div class="sub">backdrop-filter · blur 16</div></div>
    <div class="tile noise"><div class="lbl">Noise</div><div class="sub">SVG fractal · 25% opacity</div></div>
    <div class="tile scan"><div class="lbl">Scanlines</div><div class="sub">repeating 1/3 px</div></div>
  </div>
</body>
</html>
