<!doctype html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); padding: 28px; color: var(--text-dim); font-family: var(--font-body); }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 20px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
  .strip { padding: 16px 0; border-top: 1px solid var(--border-faint); }
  .strip:first-child { border-top: none; padding-top: 0; }
  #root { display: flex; flex-direction: column; gap: 4px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, IconButton, Badge, Avatar, Card, Input } = window.AudiovidoFanClubDesignSystem_013bf7;

  function Demo() {
    const [msg, setMsg] = React.useState("Say something to the room…");
    return (
      <div className="club-music">
        <div className="strip">
          <div className="lbl">Button · variants</div>
          <div className="row">
            <Button variant="primary" icon="▶">Join club</Button>
            <Button variant="ghost">Skip</Button>
            <Button variant="glow">React</Button>
            <Button variant="primary" disabled>Disabled</Button>
          </div>
        </div>
        <div className="strip">
          <div className="lbl">Button · sizes</div>
          <div className="row">
            <Button size="sm" variant="glow">SM</Button>
            <Button size="md" variant="glow">MD</Button>
            <Button size="lg" variant="glow">LG</Button>
          </div>
        </div>
        <div className="strip">
          <div className="lbl">IconButton</div>
          <div className="row">
            <IconButton label="Mic" variant="primary" size="lg">🎤</IconButton>
            <IconButton label="React" variant="glow">😍</IconButton>
            <IconButton label="Share" variant="ghost">↗</IconButton>
            <IconButton label="Notifs" variant="ghost" badge>🔔</IconButton>
          </div>
        </div>
        <div className="strip">
          <div className="lbl">Badge</div>
          <div className="row">
            <Badge variant="live" pulse>OPEN MIC</Badge>
            <Badge variant="accent">MEMBER</Badge>
            <Badge variant="default">47 ONLINE</Badge>
            <Badge variant="outline">CHILL</Badge>
          </div>
        </div>
        <div className="strip">
          <div className="lbl">Avatar</div>
          <div className="row">
            <Avatar name="Reni Q" />
            <Avatar name="Mara" active />
            <Avatar name="Iggy" status="online" />
            <Avatar name="Echo" status="live" size={56} active />
          </div>
        </div>
        <div className="strip">
          <div className="lbl">Input</div>
          <Input value={msg} onChange={setMsg} icon="✎" />
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
