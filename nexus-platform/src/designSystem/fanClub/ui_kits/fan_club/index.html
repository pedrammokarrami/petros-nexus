<!-- @dsCard group="Fan Club" viewport="1440x900" name="Fan Club Page" subtitle="The full interactive Fan Club experience — switchable Music / Cinema rooms." -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Fan Club · Audiovido</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body, #root { height: 100%; }
  body { margin: 0; background: var(--void-900); color: var(--text-body); overflow-x: hidden; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Design system bundle -->
<script src="../../_ds_bundle.js"></script>

<!-- Data + kit components -->
<script type="text/babel" src="./data.js"></script>
<script type="text/babel" src="./Particles.jsx"></script>
<script type="text/babel" src="./Decor.jsx"></script>
<script type="text/babel" src="./ClubStats.jsx"></script>
<script type="text/babel" src="./FloorActions.jsx"></script>
<script type="text/babel" src="./FanClubPage.jsx"></script>

<script type="text/babel">
  function App() {
    const CLUBS = window.__CLUBS || {};
    const [slug, setSlug] = React.useState("night-shift");
    const club = CLUBS[slug];
    const otherSlug = slug === "night-shift" ? "velvet-reel" : "night-shift";
    const other = CLUBS[otherSlug];
    const FanClubPage = window.__FanClubPage;
    if (!FanClubPage || !club) {
      return (
        <div style={{ padding: 40, fontFamily: "var(--font-mono)", color: "var(--text-dim)" }}>
          Loading…
        </div>
      );
    }
    return (
      <FanClubPage
        club={club}
        otherClubLabel={other.name}
        otherClubScope={other.scope}
        onSwitchClub={() => setSlug(otherSlug)}
      />
    );
  }

  // Babel-standalone transpiles external src files asynchronously; mount on next tick
  // so all `window.__*` assignments have run.
  setTimeout(() => {
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  }, 0);
</script>
</body>
</html>
